name: First Godot import feedback
description: Share a successful or failed published pack import with reproducible environment details.
title: "[First import]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing a published Mapsoo Worldsmith pack.

        Use the [10-minute guide](https://github.com/babyrush0101-source/mapsoo-kids/blob/main/docs/10_FIRST_GODOT_IMPORT.md) and download only from the [audited releases](https://github.com/babyrush0101-source/mapsoo-kids/releases). Do not include private paths, credentials, children's data, private STOYO content, or unlicensed assets.
  - type: dropdown
    id: outcome
    attributes:
      label: First-import outcome
      options:
        - Success in under 5 minutes
        - Success in 5–10 minutes
        - Success in 11–20 minutes
        - Success after more than 20 minutes
        - Import failed
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11 24H2, macOS 15.5, Ubuntu 24.04, …
    validations:
      required: true
  - type: input
    id: godot
    attributes:
      label: Exact Godot version
      placeholder: 4.3.0.stable, 4.7.stable, …
    validations:
      required: true
  - type: input
    id: release
    attributes:
      label: Release tag
      description: Copy the exact tag shown on the GitHub Release page.
      placeholder: v0.1.0-alpha.3
    validations:
      required: true
  - type: input
    id: pack
    attributes:
      label: Pack filename and SHA-256
      placeholder: mapsoo-sunny-meadow-v0.1.0-alpha.3.zip — af95a4e…08589696
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Result and exact error text
      description: For success, confirm the generated scene path and importer status. For failure, paste the complete importer error and the last successful step.
      placeholder: Import returned created; res://mapsoo_imports/sunny-meadow/sunny-meadow.world.tscn opened successfully.
    validations:
      required: true
  - type: textarea
    id: friction
    attributes:
      label: What was confusing or slow?
      description: Mention any instruction, download, extraction, plugin, or import step that should be clearer.
  - type: textarea
    id: evidence
    attributes:
      label: Optional screenshot or minimal reproduction
      description: Attach only public-safe evidence with private local paths removed.
  - type: checkboxes
    id: safety
    attributes:
      label: Data safety
      options:
        - label: I removed credentials, children's data, private paths, private STOYO data, and unlicensed assets.
          required: true
