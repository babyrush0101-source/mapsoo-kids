name: Build tagged release draft

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      pack_artifact: ${{ steps.candidate-pack.outputs.artifact }}
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            video/pnpm-lock.yaml

      - name: Confirm tag points to current main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          main_sha="$(git rev-parse origin/main)"
          test "$GITHUB_SHA" = "$main_sha" || {
            echo "Release tags must point to current main ($main_sha), received $GITHUB_SHA" >&2
            exit 1
          }

      - name: Confirm tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          expected_tag="v$(node --print "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "$expected_tag" || {
            echo "Expected tag $expected_tag, received $GITHUB_REF_NAME" >&2
            exit 1
          }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install historical alpha.1 video dependencies
        run: pnpm --dir video install --frozen-lockfile

      - name: Audit high-severity dependency advisories
        run: pnpm security:audit

      - name: Run project checks
        run: pnpm check

      - name: Verify immutable public GitHub release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: pnpm release:history:remote

      - name: Verify the real browser exporter matches the registered candidate pack
        run: pnpm release:browser:verify

      - name: Verify historical alpha.1 video source and committed MP4
        run: pnpm --dir video lint && pnpm --dir video verify:source && pnpm --dir video verify:output

      - name: Build and verify reproducible release assets
        run: pnpm release:local

      - name: Bind the exact compatibility and STOYO bridge packs for Godot jobs
        id: candidate-pack
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { appendFileSync } from 'node:fs';
          import { cp, mkdir, readFile, writeFile } from 'node:fs/promises';
          import { join } from 'node:path';
          import { CURRENT_RELEASE_CONFIG, REPOSITORY_ROOT } from './scripts/release-config.mjs';
          import { examplePacksForConfig, sha256 } from './scripts/release-lib.mjs';
          const config = CURRENT_RELEASE_CONFIG;
          const stage = join(REPOSITORY_ROOT, 'release', 'godot-pack-set');
          await mkdir(stage, { recursive: true });
          const descriptors = [];
          for (const pack of examplePacksForConfig(config)) {
            const file = config.release.files[pack.releaseFileKey];
            const source = join(REPOSITORY_ROOT, 'release', config.tag, file);
            const bytes = await readFile(source);
            if (sha256(bytes) !== pack.expectedSha256) throw new Error(`${pack.id} staged hash mismatch`);
            await cp(source, join(stage, file));
            const fixture = join(REPOSITORY_ROOT, pack.sourceDirectory);
            const manifest = JSON.parse(await readFile(join(fixture, 'mapsoo.manifest.json'), 'utf8'));
            const world = JSON.parse(await readFile(join(fixture, 'worlds', `${pack.id}.world.json`), 'utf8'));
            const demo = JSON.parse(await readFile(join(fixture, 'worlds', 'demo-world.json'), 'utf8'));
            const places = JSON.parse(await readFile(join(fixture, 'runtime', 'places.json'), 'utf8'));
            const structures = JSON.parse(await readFile(join(fixture, 'runtime', 'structures.json'), 'utf8'));
            descriptors.push({ id: pack.id, file, sha256: pack.expectedSha256, archiveRoot: pack.archiveRoot, schemaVersion: manifest.schema_version, cellCount: world.map.width * world.map.height, propCount: demo.props.length, placeCount: places.places.length, structureCount: structures.structures.length });
          }
          await writeFile(join(stage, 'pack-set.json'), `${JSON.stringify({ schemaVersion: 1, packs: descriptors }, null, 2)}\n`);
          appendFileSync(process.env.GITHUB_OUTPUT, `artifact=mapsoo-example-packs-${config.tag}\npath=${stage}\n`);
          NODE
          pnpm stoyo:export -- \
            --input examples/integrations/stoyo/river-valley-asset-request.json \
            --out-dir release/godot-pack-set/stoyo \
            --completed-at 2026-07-19T12:00:00.000Z
          alpha9_zip="$(node --input-type=module --eval "import { CURRENT_RELEASE_CONFIG as c } from './scripts/release-config.mjs'; process.stdout.write(c.release.files.completeFarmPack)")"
          alpha9_root="$(node --input-type=module --eval "import { CURRENT_RELEASE_CONFIG as c } from './scripts/release-config.mjs'; process.stdout.write(c.release.directoryArchives[0].archiveRoot)")"
          mkdir -p release/godot-pack-set/alpha9 release/godot-pack-set/.alpha9-extracted
          unzip -q "release/$GITHUB_REF_NAME/$alpha9_zip" -d release/godot-pack-set/.alpha9-extracted
          cp -R "release/godot-pack-set/.alpha9-extracted/$alpha9_root/." release/godot-pack-set/alpha9/
          rm -rf release/godot-pack-set/.alpha9-extracted

      - name: Preserve the verified release pack set for Godot jobs
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.candidate-pack.outputs.artifact }}
          path: ${{ steps.candidate-pack.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      - name: Preserve release bundle as a workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: mapsoo-worldsmith-${{ github.ref_name }}
          path: release/${{ github.ref_name }}/
          if-no-files-found: error
          retention-days: 30

  godot-release-smoke:
    name: Godot ${{ matrix.version }} exact release pack
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "4.3"
            url: https://github.com/godotengine/godot-builds/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
            archive: Godot_v4.3-stable_linux.x86_64.zip
            executable: Godot_v4.3-stable_linux.x86_64
            sha256: 7de56444b130b10af84d19c7e0cf63cf9e9937ee4ba94364c3b7dd114253ca21
          - version: "4.7"
            url: https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
            archive: Godot_v4.7-stable_linux.x86_64.zip
            executable: Godot_v4.7-stable_linux.x86_64
            sha256: 0b1a6c54c2c619c12e169fe9241edda4b81080b519451cec2984bf0d2c6cb73c

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4

      - name: Download the verified release pack set
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.pack_artifact }}
          path: ${{ runner.temp }}/mapsoo-release-packs

      - name: Verify and extract the exact release pack set
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $artifact = Join-Path $env:RUNNER_TEMP 'mapsoo-release-packs'
          $descriptorPath = Join-Path $artifact 'pack-set.json'
          $descriptor = Get-Content -LiteralPath $descriptorPath -Raw | ConvertFrom-Json
          if ($descriptor.schemaVersion -ne 1 -or @($descriptor.packs).Count -ne 3) { throw 'Invalid three-pack descriptor.' }
          $extractRoot = Join-Path $env:RUNNER_TEMP 'mapsoo-release-extracted'
          New-Item -ItemType Directory -Path $extractRoot | Out-Null
          foreach ($pack in @($descriptor.packs)) {
            $zip = Join-Path $artifact $pack.file
            if ((Get-FileHash -LiteralPath $zip -Algorithm SHA256).Hash.ToLowerInvariant() -ne $pack.sha256) { throw "$($pack.id) SHA-256 mismatch." }
            Expand-Archive -LiteralPath $zip -DestinationPath $extractRoot
            $manifest = Get-Content -LiteralPath (Join-Path (Join-Path $extractRoot $pack.archiveRoot) 'mapsoo.manifest.json') -Raw | ConvertFrom-Json
            if ($manifest.pack.id -ne $pack.id -or $manifest.schema_version -ne $pack.schemaVersion) { throw "$($pack.id) manifest identity mismatch." }
          }
          "MAPSOO_PACK_SET_DESCRIPTOR=$descriptorPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MAPSOO_PACK_SET_EXTRACTED=$extractRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download and verify Godot ${{ matrix.version }}
        shell: bash
        env:
          GODOT_ARCHIVE: ${{ matrix.archive }}
          GODOT_EXECUTABLE: ${{ matrix.executable }}
          GODOT_SHA256: ${{ matrix.sha256 }}
          GODOT_URL: ${{ matrix.url }}
        run: |
          set -euo pipefail
          install_dir="$RUNNER_TEMP/mapsoo-godot-${{ matrix.version }}"
          archive_path="$RUNNER_TEMP/$GODOT_ARCHIVE"
          mkdir -p "$install_dir"
          curl --fail --location --retry 3 --retry-all-errors \
            --output "$archive_path" "$GODOT_URL"
          printf '%s  %s\n' "$GODOT_SHA256" "$archive_path" \
            | sha256sum --check --strict -
          unzip -q "$archive_path" -d "$install_dir"
          godot_bin="$install_dir/$GODOT_EXECUTABLE"
          test -f "$godot_bin"
          chmod +x "$godot_bin"
          printf 'GODOT_BIN=%s\n' "$godot_bin" >> "$GITHUB_ENV"

      - name: Print Godot version
        run: '"$GODOT_BIN" --version'

      - name: Check release importer scripts
        shell: bash
        run: |
          set -euo pipefail
          scripts=(
            res://addons/mapsoo_importer/mapsoo_pack_importer.gd
            res://tests/import_pack_cli.gd
            res://tests/import_alpha9_smoke.gd
          )
          for script in "${scripts[@]}"; do
            log_file="$RUNNER_TEMP/mapsoo-release-check-$(basename "$script").log"
            "$GODOT_BIN" --headless --path godot --check-only \
              --script "$script" 2>&1 | tee "$log_file"
            if grep -Eq '^(SCRIPT )?ERROR:' "$log_file"; then
              echo "Godot emitted an engine error while checking $script." >&2
              exit 1
            fi
          done

      - name: Run Linux release transaction contract
        shell: bash
        run: |
          set -euo pipefail
          pwsh -NoLogo -NoProfile -File godot/tests/run-smoke.ps1 -GodotConsole "$GODOT_BIN"

      - name: Import all three exact verified release packs
        shell: pwsh
        run: |
          & scripts/run-exact-pack-set.ps1 `
            -DescriptorPath $env:MAPSOO_PACK_SET_DESCRIPTOR `
            -ExtractedRoot $env:MAPSOO_PACK_SET_EXTRACTED `
            -GodotConsole $env:GODOT_BIN

      - name: Import the exact STOYO bridge pack
        shell: pwsh
        run: |
          & scripts/run-stoyo-pack-godot.ps1 `
            -ArtifactRoot (Join-Path $env:RUNNER_TEMP 'mapsoo-release-packs/stoyo') `
            -GodotConsole $env:GODOT_BIN

      - name: Import the exact Alpha.9 complete farm pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p godot/tests/.generated/pack-alpha9
          cp -R "$RUNNER_TEMP/mapsoo-release-packs/alpha9/." godot/tests/.generated/pack-alpha9/
          "$GODOT_BIN" --headless --path godot --script res://tests/import_alpha9_smoke.gd

  godot-release-windows-smoke:
    name: Godot ${{ matrix.version }} Windows release transaction
    needs: build
    runs-on: windows-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "4.3"
            url: https://github.com/godotengine/godot-builds/releases/download/4.3-stable/Godot_v4.3-stable_win64.exe.zip
            archive: Godot_v4.3-stable_win64.exe.zip
            executable: Godot_v4.3-stable_win64_console.exe
            sha512: ad09b7e19949327700dfbe64e35880a2a08091c0751277f5cc21b915e5df9b4fe93fb43c50d6bdfb9d16b46168592491aa698e0d2dbe9f92132e163dd77b97e1
          - version: "4.7"
            url: https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_win64.exe.zip
            archive: Godot_v4.7-stable_win64.exe.zip
            executable: Godot_v4.7-stable_win64_console.exe
            sha512: 41645a908eb3181d6f2d1201ed7b6d6f095f6a23aaed8903d5d255277cc8d142814f3e6817f865b3cac142c39b8aff99280091d3bbdaa301517730b3ba0522b9

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4

      - name: Download the verified release pack set
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.pack_artifact }}
          path: ${{ runner.temp }}/mapsoo-release-packs

      - name: Verify and extract the exact release pack set
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $artifact = Join-Path $env:RUNNER_TEMP 'mapsoo-release-packs'
          $descriptorPath = Join-Path $artifact 'pack-set.json'
          $descriptor = Get-Content -LiteralPath $descriptorPath -Raw | ConvertFrom-Json
          if ($descriptor.schemaVersion -ne 1 -or @($descriptor.packs).Count -ne 3) { throw 'Invalid three-pack descriptor.' }
          $extractRoot = Join-Path $env:RUNNER_TEMP 'mapsoo-release-extracted'
          New-Item -ItemType Directory -Path $extractRoot | Out-Null
          foreach ($pack in @($descriptor.packs)) {
            $zip = Join-Path $artifact $pack.file
            if ((Get-FileHash -LiteralPath $zip -Algorithm SHA256).Hash.ToLowerInvariant() -ne $pack.sha256) { throw "$($pack.id) SHA-256 mismatch." }
            Expand-Archive -LiteralPath $zip -DestinationPath $extractRoot
            $manifest = Get-Content -LiteralPath (Join-Path (Join-Path $extractRoot $pack.archiveRoot) 'mapsoo.manifest.json') -Raw | ConvertFrom-Json
            if ($manifest.pack.id -ne $pack.id -or $manifest.schema_version -ne $pack.schemaVersion) { throw "$($pack.id) manifest identity mismatch." }
          }
          "MAPSOO_PACK_SET_DESCRIPTOR=$descriptorPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MAPSOO_PACK_SET_EXTRACTED=$extractRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download and verify Godot ${{ matrix.version }}
        shell: pwsh
        env:
          GODOT_ARCHIVE: ${{ matrix.archive }}
          GODOT_EXECUTABLE: ${{ matrix.executable }}
          GODOT_SHA512: ${{ matrix.sha512 }}
          GODOT_URL: ${{ matrix.url }}
        run: |
          $ErrorActionPreference = 'Stop'
          $archivePath = Join-Path $env:RUNNER_TEMP $env:GODOT_ARCHIVE
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            try {
              Invoke-WebRequest -Uri $env:GODOT_URL -OutFile $archivePath
              break
            }
            catch {
              if ($attempt -eq 3) { throw }
              Write-Warning "Godot download attempt $attempt failed; retrying."
              if (Test-Path -LiteralPath $archivePath) { Remove-Item -LiteralPath $archivePath -Force }
              Start-Sleep -Seconds 2
            }
          }
          $actualHash = (Get-FileHash -LiteralPath $archivePath -Algorithm SHA512).Hash.ToLowerInvariant()
          if ($actualHash -ne $env:GODOT_SHA512) { throw "Godot SHA-512 mismatch: $actualHash" }
          $installDir = Join-Path $env:RUNNER_TEMP "mapsoo-release-godot-${{ matrix.version }}-windows"
          Expand-Archive -LiteralPath $archivePath -DestinationPath $installDir
          $godotBin = Join-Path $installDir $env:GODOT_EXECUTABLE
          if (-not (Test-Path -LiteralPath $godotBin -PathType Leaf)) { throw 'Godot console executable is missing.' }
          "GODOT_BIN=$godotBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Check release importer scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $scripts = @(
            'res://addons/mapsoo_importer/mapsoo_pack_importer.gd',
            'res://addons/mapsoo_importer/mapsoo_importer_plugin.gd',
            'res://tests/generate_fixture.gd',
            'res://tests/import_smoke.gd',
            'res://tests/import_pack_cli.gd',
            'res://tests/import_alpha9_smoke.gd'
          )
          foreach ($script in $scripts) {
            $output = @(& $env:GODOT_BIN --headless --path godot --check-only --script $script 2>&1)
            $output | ForEach-Object { Write-Host $_.ToString() }
            if ($LASTEXITCODE -ne 0 -or ($output | ForEach-Object { $_.ToString() }) -match '^(?:SCRIPT )?ERROR:') {
              throw "GDScript syntax check failed: $script"
            }
          }

      - name: Run Windows release transaction contract
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File godot/tests/run-smoke.ps1 -GodotConsole $env:GODOT_BIN

      - name: Import all three exact verified release packs
        shell: pwsh
        run: |
          & scripts/run-exact-pack-set.ps1 `
            -DescriptorPath $env:MAPSOO_PACK_SET_DESCRIPTOR `
            -ExtractedRoot $env:MAPSOO_PACK_SET_EXTRACTED `
            -GodotConsole $env:GODOT_BIN

      - name: Import the exact STOYO bridge pack
        shell: pwsh
        run: |
          & scripts/run-stoyo-pack-godot.ps1 `
            -ArtifactRoot (Join-Path $env:RUNNER_TEMP 'mapsoo-release-packs/stoyo') `
            -GodotConsole $env:GODOT_BIN

      - name: Import the exact Alpha.9 complete farm pack
        shell: pwsh
        run: |
          $fixtureRoot = Join-Path (Resolve-Path godot/tests).Path '.generated/pack-alpha9'
          New-Item -ItemType Directory -Path $fixtureRoot -Force | Out-Null
          Copy-Item -Path (Join-Path $env:RUNNER_TEMP 'mapsoo-release-packs/alpha9/*') -Destination $fixtureRoot -Recurse -Force
          & $env:GODOT_BIN --headless --path godot --script res://tests/import_alpha9_smoke.gd
          if ($LASTEXITCODE -ne 0) { throw 'Alpha.9 Godot release smoke failed.' }

  publish-draft:
    name: Publish verified GitHub release draft
    needs: [build, godot-release-smoke, godot-release-windows-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Check out tagged release notes
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download verified release bundle
        uses: actions/download-artifact@v4
        with:
          name: mapsoo-worldsmith-${{ github.ref_name }}
          path: release/${{ github.ref_name }}

      - name: Create GitHub release draft
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            "release/$GITHUB_REF_NAME/"* \
            --verify-tag \
            --draft \
            --prerelease \
            --title "Mapsoo Worldsmith $GITHUB_REF_NAME — Portable Godot World Pack / 可移植 Godot 世界素材包" \
            --notes-file "docs/releases/$GITHUB_REF_NAME.md"
