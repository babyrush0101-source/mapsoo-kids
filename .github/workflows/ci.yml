name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      pack_artifact: ${{ steps.candidate-pack.outputs.artifact }}
      pack_file: ${{ steps.candidate-pack.outputs.file }}
      pack_hash: ${{ steps.candidate-pack.outputs.hash }}
      pack_root: ${{ steps.candidate-pack.outputs.root }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            video/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install historical alpha.1 video dependencies
        run: pnpm --dir video install --frozen-lockfile

      - name: Audit high-severity dependency advisories
        run: pnpm security:audit

      - name: Run project checks
        run: pnpm check

      - name: Verify immutable public GitHub release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: pnpm release:history:remote

      - name: Verify the real browser exporter matches the registered candidate pack
        run: pnpm release:browser:verify

      - name: Build and verify reproducible release and itch.io operator bundles
        shell: bash
        run: |
          set -euo pipefail
          lifecycle="$(node --input-type=module --eval "import { CURRENT_RELEASE_CONFIG } from './scripts/release-config.mjs'; process.stdout.write(CURRENT_RELEASE_CONFIG.lifecycle)")"
          if [ "$lifecycle" = candidate ]; then
            pnpm release:local
            pnpm release:itch
          else
            test "$lifecycle" = published
            echo "Published release bytes are verified from GitHub by release:history:remote; rebuilding is intentionally disabled."
            node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto';
          import { mkdir, writeFile } from 'node:fs/promises';
          import { dirname, join } from 'node:path';
          import { CURRENT_RELEASE_CONFIG, REPOSITORY_ROOT } from './scripts/release-config.mjs';

          const config = CURRENT_RELEASE_CONFIG;
          const fileName = config.release.files.examplePack;
          const url = `https://github.com/babyrush0101-source/mapsoo-kids/releases/download/${config.tag}/${fileName}`;
          const response = await fetch(url, { redirect: 'follow' });
          if (!response.ok) throw new Error(`Unable to download published example pack: HTTP ${response.status}`);
          const bytes = Buffer.from(await response.arrayBuffer());
          const actualHash = createHash('sha256').update(bytes).digest('hex');
          if (actualHash !== config.publicExamplePackSha256) {
            throw new Error(`Published example-pack SHA-256 mismatch: ${actualHash}`);
          }
          const outputPath = join(
            REPOSITORY_ROOT,
            'release',
            'itch',
            config.tag,
            'uploads',
            fileName,
          );
          await mkdir(dirname(outputPath), { recursive: true });
          await writeFile(outputPath, bytes);
          console.log(`MAPSOO_PUBLISHED_PACK_DOWNLOADED bytes=${bytes.length} sha256=${actualHash}`);
          NODE
          fi

      - name: Verify historical alpha.1 video source and committed MP4
        run: pnpm --dir video lint && pnpm --dir video verify:source && pnpm --dir video verify:output

      - name: Bind the verified candidate pack for Godot jobs
        id: candidate-pack
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { appendFileSync } from 'node:fs';
          import { CURRENT_RELEASE_CONFIG } from './scripts/release-config.mjs';
          const config = CURRENT_RELEASE_CONFIG;
          const values = {
            artifact: `mapsoo-example-pack-${config.tag}`,
            file: config.release.files.examplePack,
            hash: config.expectedExamplePackSha256,
            path: `release/itch/${config.tag}/uploads/${config.release.files.examplePack}`,
            root: config.release.examplePack.archiveRoot,
          };
          appendFileSync(process.env.GITHUB_OUTPUT, `${Object.entries(values).map(([key, value]) => `${key}=${value}`).join('\n')}\n`);
          NODE

      - name: Upload the verified candidate pack
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.candidate-pack.outputs.artifact }}
          path: ${{ steps.candidate-pack.outputs.path }}
          if-no-files-found: error
          retention-days: 7

  godot-smoke:
    name: Godot ${{ matrix.version }} smoke
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "4.3"
            url: https://github.com/godotengine/godot-builds/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
            archive: Godot_v4.3-stable_linux.x86_64.zip
            executable: Godot_v4.3-stable_linux.x86_64
            sha256: 7de56444b130b10af84d19c7e0cf63cf9e9937ee4ba94364c3b7dd114253ca21
          - version: "4.7"
            url: https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
            archive: Godot_v4.7-stable_linux.x86_64.zip
            executable: Godot_v4.7-stable_linux.x86_64
            sha256: 0b1a6c54c2c619c12e169fe9241edda4b81080b519451cec2984bf0d2c6cb73c

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download the exact verified candidate pack
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.check.outputs.pack_artifact }}
          path: ${{ runner.temp }}/mapsoo-candidate-pack

      - name: Verify and extract the candidate pack
        shell: bash
        env:
          MAPSOO_PACK_FILE: ${{ needs.check.outputs.pack_file }}
          MAPSOO_PACK_HASH: ${{ needs.check.outputs.pack_hash }}
          MAPSOO_PACK_ROOT: ${{ needs.check.outputs.pack_root }}
        run: |
          set -euo pipefail
          pack_path="$RUNNER_TEMP/mapsoo-candidate-pack/$MAPSOO_PACK_FILE"
          extract_dir="$RUNNER_TEMP/mapsoo-candidate-extracted"
          test -f "$pack_path"
          printf '%s  %s\n' "$MAPSOO_PACK_HASH" "$pack_path" | sha256sum --check --strict -
          mkdir -p "$extract_dir"
          unzip -q "$pack_path" -d "$extract_dir"
          test "$(find "$extract_dir" -mindepth 1 -maxdepth 1 -type d | wc -l)" -eq 1
          test "$(find "$extract_dir" -type f ! -path "$extract_dir/$MAPSOO_PACK_ROOT/*" | wc -l)" -eq 0
          manifest_path="$extract_dir/$MAPSOO_PACK_ROOT/mapsoo.manifest.json"
          test -f "$manifest_path"
          actual_files="$(find "$extract_dir" -type f | wc -l)"
          expected_files="$(node -e 'const fs=require("fs");const m=JSON.parse(fs.readFileSync(process.argv[1],"utf8"));if(!Array.isArray(m.files))process.exit(2);process.stdout.write(String(m.files.length+1))' "$manifest_path")"
          test "$actual_files" -eq "$expected_files"
          pack_schema="$(node -e 'const fs=require("fs");const m=JSON.parse(fs.readFileSync(process.argv[1],"utf8"));if(typeof m.schema_version!=="string"||!/^\d+\.\d+\.\d+$/.test(m.schema_version))process.exit(2);process.stdout.write(m.schema_version)' "$manifest_path")"
          printf 'MAPSOO_CANDIDATE_MANIFEST=%s\n' "$manifest_path" >> "$GITHUB_ENV"
          printf 'MAPSOO_CANDIDATE_SCHEMA=%s\n' "$pack_schema" >> "$GITHUB_ENV"

      - name: Download and verify Godot ${{ matrix.version }}
        shell: bash
        env:
          GODOT_ARCHIVE: ${{ matrix.archive }}
          GODOT_EXECUTABLE: ${{ matrix.executable }}
          GODOT_SHA256: ${{ matrix.sha256 }}
          GODOT_URL: ${{ matrix.url }}
        run: |
          set -euo pipefail
          install_dir="$RUNNER_TEMP/mapsoo-godot-${{ matrix.version }}"
          archive_path="$RUNNER_TEMP/$GODOT_ARCHIVE"
          mkdir -p "$install_dir"
          curl --fail --location --retry 3 --retry-all-errors \
            --output "$archive_path" "$GODOT_URL"
          printf '%s  %s\n' "$GODOT_SHA256" "$archive_path" \
            | sha256sum --check --strict -
          unzip -q "$archive_path" -d "$install_dir"
          godot_bin="$install_dir/$GODOT_EXECUTABLE"
          test -f "$godot_bin"
          chmod +x "$godot_bin"
          printf 'GODOT_BIN=%s\n' "$godot_bin" >> "$GITHUB_ENV"

      - name: Print Godot version
        run: '"$GODOT_BIN" --version'

      - name: Check GDScript syntax
        shell: bash
        run: |
          set -euo pipefail
          scripts=(
            res://addons/mapsoo_importer/mapsoo_pack_importer.gd
            res://addons/mapsoo_importer/mapsoo_importer_plugin.gd
            res://tests/import_smoke.gd
            res://tests/import_pack_cli.gd
          )
          for script in "${scripts[@]}"; do
            log_file="$RUNNER_TEMP/mapsoo-check-$(basename "$script").log"
            "$GODOT_BIN" --headless --path godot --check-only \
              --script "$script" 2>&1 | tee "$log_file"
            if grep -Eq '^(SCRIPT )?ERROR:' "$log_file"; then
              echo "Godot emitted an engine error while checking $script." >&2
              exit 1
            fi
          done

      - name: Generate deterministic fixture
        shell: bash
        run: |
          set -euo pipefail
          log_file="$RUNNER_TEMP/mapsoo-fixture-${{ matrix.version }}.log"
          "$GODOT_BIN" --headless --path godot \
            --script res://tests/generate_fixture.gd 2>&1 | tee "$log_file"
          if grep -Eq '^(SCRIPT )?ERROR:' "$log_file"; then
            echo "Godot emitted an engine error while generating fixtures." >&2
            exit 1
          fi

      - name: Import generated resources in the editor
        shell: bash
        run: |
          set -euo pipefail
          log_file="$RUNNER_TEMP/mapsoo-editor-import-${{ matrix.version }}.log"
          "$GODOT_BIN" --headless --editor --path godot --import 2>&1 | tee "$log_file"
          if grep -Eq '^(SCRIPT )?ERROR:' "$log_file"; then
            echo "Godot emitted an engine error while importing test resources." >&2
            exit 1
          fi

      - name: Run importer smoke contract
        shell: bash
        run: |
          set -euo pipefail
          log_file="$RUNNER_TEMP/mapsoo-godot-smoke-${{ matrix.version }}.log"
          "$GODOT_BIN" --headless --path godot \
            --script res://tests/import_smoke.gd 2>&1 | tee "$log_file"
          if grep -Eq '^(SCRIPT )?ERROR:' "$log_file"; then
            echo "Godot emitted an engine error during the smoke test." >&2
            exit 1
          fi

      - name: Import the exact verified candidate pack
        shell: bash
        run: |
          set -euo pipefail
          log_file="$RUNNER_TEMP/mapsoo-candidate-pack-${{ matrix.version }}.log"
          "$GODOT_BIN" --headless --path godot \
            --script res://tests/import_pack_cli.gd -- \
            --manifest="$MAPSOO_CANDIDATE_MANIFEST" 2>&1 | tee "$log_file"
          if grep -Eq '^(SCRIPT )?ERROR:' "$log_file"; then
            echo "Godot emitted an engine error while importing the candidate pack." >&2
            exit 1
          fi
          grep -Fx "MAPSOO_PACK_CLI_OK pack_id=sunny-meadow schema=$MAPSOO_CANDIDATE_SCHEMA cells=384 props=29 first=created second=unchanged" "$log_file"

  godot-windows-smoke:
    name: Godot ${{ matrix.version }} Windows transaction smoke
    needs: check
    runs-on: windows-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "4.3"
            url: https://github.com/godotengine/godot-builds/releases/download/4.3-stable/Godot_v4.3-stable_win64.exe.zip
            archive: Godot_v4.3-stable_win64.exe.zip
            executable: Godot_v4.3-stable_win64_console.exe
            sha512: ad09b7e19949327700dfbe64e35880a2a08091c0751277f5cc21b915e5df9b4fe93fb43c50d6bdfb9d16b46168592491aa698e0d2dbe9f92132e163dd77b97e1
          - version: "4.7"
            url: https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_win64.exe.zip
            archive: Godot_v4.7-stable_win64.exe.zip
            executable: Godot_v4.7-stable_win64_console.exe
            sha512: 41645a908eb3181d6f2d1201ed7b6d6f095f6a23aaed8903d5d255277cc8d142814f3e6817f865b3cac142c39b8aff99280091d3bbdaa301517730b3ba0522b9

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download the exact verified candidate pack
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.check.outputs.pack_artifact }}
          path: ${{ runner.temp }}/mapsoo-candidate-pack

      - name: Verify and extract the candidate pack
        shell: pwsh
        env:
          MAPSOO_PACK_FILE: ${{ needs.check.outputs.pack_file }}
          MAPSOO_PACK_HASH: ${{ needs.check.outputs.pack_hash }}
          MAPSOO_PACK_ROOT: ${{ needs.check.outputs.pack_root }}
        run: |
          $ErrorActionPreference = 'Stop'
          $packPath = Join-Path $env:RUNNER_TEMP "mapsoo-candidate-pack\$env:MAPSOO_PACK_FILE"
          $actualHash = (Get-FileHash -LiteralPath $packPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $env:MAPSOO_PACK_HASH) { throw "Candidate pack SHA-256 mismatch: $actualHash" }
          $extractDir = Join-Path $env:RUNNER_TEMP 'mapsoo-candidate-extracted'
          Expand-Archive -LiteralPath $packPath -DestinationPath $extractDir
          $files = @(Get-ChildItem -LiteralPath $extractDir -Recurse -File)
          $rootDirectories = @(Get-ChildItem -LiteralPath $extractDir -Directory)
          if ($rootDirectories.Count -ne 1 -or $rootDirectories[0].Name -ne $env:MAPSOO_PACK_ROOT) { throw 'Unexpected archive root.' }
          $rootPath = $rootDirectories[0].FullName
          $rootPrefix = $rootPath + [IO.Path]::DirectorySeparatorChar
          foreach ($file in $files) {
            if (-not $file.FullName.StartsWith($rootPrefix, [StringComparison]::OrdinalIgnoreCase)) {
              throw "Candidate pack contains a file outside its archive root: $($file.FullName)"
            }
          }
          $manifestPath = Join-Path $extractDir "$env:MAPSOO_PACK_ROOT\mapsoo.manifest.json"
          if (-not (Test-Path -LiteralPath $manifestPath -PathType Leaf)) { throw 'Candidate manifest is missing.' }
          $manifest = Get-Content -LiteralPath $manifestPath -Raw | ConvertFrom-Json
          $expectedFiles = @($manifest.files).Count + 1
          if ($files.Count -ne $expectedFiles) { throw "Expected $expectedFiles manifest-covered files, got $($files.Count)." }
          if (-not ($manifest.schema_version -is [string]) -or $manifest.schema_version -notmatch '^\d+\.\d+\.\d+$') { throw 'Candidate manifest schema_version is invalid.' }
          "MAPSOO_CANDIDATE_MANIFEST=$manifestPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MAPSOO_CANDIDATE_SCHEMA=$($manifest.schema_version)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download and verify Godot ${{ matrix.version }}
        shell: pwsh
        env:
          GODOT_ARCHIVE: ${{ matrix.archive }}
          GODOT_EXECUTABLE: ${{ matrix.executable }}
          GODOT_SHA512: ${{ matrix.sha512 }}
          GODOT_URL: ${{ matrix.url }}
        run: |
          $ErrorActionPreference = 'Stop'
          $archivePath = Join-Path $env:RUNNER_TEMP $env:GODOT_ARCHIVE
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            try {
              Invoke-WebRequest -Uri $env:GODOT_URL -OutFile $archivePath
              break
            }
            catch {
              if ($attempt -eq 3) { throw }
              Write-Warning "Godot download attempt $attempt failed; retrying."
              if (Test-Path -LiteralPath $archivePath) { Remove-Item -LiteralPath $archivePath -Force }
              Start-Sleep -Seconds 2
            }
          }
          $actualHash = (Get-FileHash -LiteralPath $archivePath -Algorithm SHA512).Hash.ToLowerInvariant()
          if ($actualHash -ne $env:GODOT_SHA512) { throw "Godot SHA-512 mismatch: $actualHash" }
          $installDir = Join-Path $env:RUNNER_TEMP "mapsoo-godot-${{ matrix.version }}-windows"
          Expand-Archive -LiteralPath $archivePath -DestinationPath $installDir
          $godotBin = Join-Path $installDir $env:GODOT_EXECUTABLE
          if (-not (Test-Path -LiteralPath $godotBin -PathType Leaf)) { throw 'Godot console executable is missing.' }
          "GODOT_BIN=$godotBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Print Godot version
        shell: pwsh
        run: '& $env:GODOT_BIN --version'

      - name: Check importer GDScript syntax
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $scripts = @(
            'res://addons/mapsoo_importer/mapsoo_pack_importer.gd',
            'res://addons/mapsoo_importer/mapsoo_importer_plugin.gd',
            'res://tests/generate_fixture.gd',
            'res://tests/import_smoke.gd',
            'res://tests/import_pack_cli.gd'
          )
          foreach ($script in $scripts) {
            $output = @(& $env:GODOT_BIN --headless --path godot --check-only --script $script 2>&1)
            $output | ForEach-Object { Write-Host $_.ToString() }
            if ($LASTEXITCODE -ne 0 -or ($output | ForEach-Object { $_.ToString() }) -match '^(?:SCRIPT )?ERROR:') {
              throw "GDScript syntax check failed: $script"
            }
          }

      - name: Run Windows importer transaction contract
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File godot/tests/run-smoke.ps1 -GodotConsole $env:GODOT_BIN

      - name: Import the exact verified candidate pack twice
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $output = @(& $env:GODOT_BIN --headless --path godot --script res://tests/import_pack_cli.gd -- "--manifest=$env:MAPSOO_CANDIDATE_MANIFEST" 2>&1)
          $output | ForEach-Object { Write-Host $_.ToString() }
          if ($LASTEXITCODE -ne 0 -or ($output | ForEach-Object { $_.ToString() }) -match '^(?:SCRIPT )?ERROR:') {
            throw 'Exact-pack import emitted an error.'
          }
          $expected = "MAPSOO_PACK_CLI_OK pack_id=sunny-meadow schema=$env:MAPSOO_CANDIDATE_SCHEMA cells=384 props=29 first=created second=unchanged"
          if (-not (($output | ForEach-Object { $_.ToString() }) -contains $expected)) { throw 'Exact-pack re-import sentinel is missing.' }
